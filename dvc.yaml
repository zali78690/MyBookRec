# Feature + ingest pipeline as a reproducible DAG.
#
# Each stage names its `cmd`, `deps` (inputs DVC hashes to detect change), and `outs`
# (artifacts DVC will track). Re-running `dvc repro` only re-executes stages whose
# inputs changed. Outputs are pushed to the configured remote with `dvc push`.
#
# Data layout (matches plans/book-recommender-mvp-plan.md):
#
#   data/
#   ├── raw/{ucsd,openlibrary,personal}/      # by source
#   ├── transformed/
#   │   ├── shared/                           # model-independent
#   │   └── v1_minilm/                        # MiniLM-384 run
#   ├── bronze/{openlibrary,openlibrary_dump,google_books}/
#   ├── silver/                               # cleaned + deduped
#   └── gold/                                 # ingest pipeline output

stages:

  transform_raw:
    cmd: .venv/bin/python -m mybookrec.data_load.transform_raw
    deps:
      - data/raw/ucsd/goodreads_books.json.gz
      - data/raw/ucsd/goodreads_book_genres_initial.json
      - data/raw/personal/goodreads_library_export.csv
      - mybookrec/data_load/transform_raw.py
    outs:
      - data/transformed/shared/books_with_genres.parquet
      - data/transformed/shared/books_with_interactions.parquet
      - data/transformed/shared/my_books.csv

  build_training_interactions:
    cmd: .venv/bin/python -m mybookrec.data_load.build_training_interactions
    deps:
      - data/transformed/shared/books_with_interactions.parquet
      - mybookrec/data_load/build_training_interactions.py
    outs:
      - data/transformed/shared/training_interactions.parquet

  build_item_features:
    cmd: .venv/bin/python -m mybookrec.features.build_item_features
    deps:
      - data/transformed/shared/books_with_genres.parquet
      - mybookrec/features/build_item_features.py
      - mybookrec/features/genre_vocab.json
    outs:
      - data/transformed/shared/genre_matrix.npy
      - data/transformed/shared/num_pages_normalized.npy
      - data/transformed/shared/num_pages_norm_params.json

  build_user_features:
    cmd: .venv/bin/python -m mybookrec.features.build_user_features
    deps:
      - data/transformed/shared/my_books.csv
      - data/transformed/shared/book_id_to_index.json
      - data/transformed/shared/genre_matrix.npy
      - data/transformed/shared/num_pages_normalized.npy
      - data/transformed/v1_minilm/book_embeddings.npy
      - mybookrec/features/build_user_features.py
    outs:
      - data/transformed/v1_minilm/user_features_basic.npy

  build_train_user_features:
    cmd: .venv/bin/python -m mybookrec.features.build_train_user_features
    deps:
      - data/transformed/shared/books_with_interactions.parquet
      - data/transformed/shared/book_id_to_index.json
      - data/transformed/shared/genre_matrix.npy
      - data/transformed/shared/num_pages_normalized.npy
      - data/transformed/v1_minilm/book_embeddings.npy
      - mybookrec/features/build_train_user_features.py
    outs:
      - data/transformed/v1_minilm/train_user_features_basic.npy
      - data/transformed/shared/user_id_to_index.json

  build_author_features:
    cmd: .venv/bin/python -m mybookrec.features.build_author_features
    deps:
      - data/raw/ucsd/goodreads_books.json.gz
      - data/transformed/shared/book_id_to_index.json
      - data/transformed/shared/user_id_to_index.json
      - data/transformed/shared/genre_matrix.npy
      - data/transformed/shared/num_pages_normalized.npy
      - data/transformed/shared/training_interactions.parquet
      - data/transformed/shared/my_books.csv
      - data/transformed/v1_minilm/book_embeddings.npy
      - data/transformed/v1_minilm/user_features_basic.npy
      - data/transformed/v1_minilm/train_user_features_basic.npy
      - mybookrec/features/build_author_features.py
    outs:
      - data/transformed/shared/author_id_to_index.json
      - data/transformed/shared/book_to_author_idx.npy
      - data/transformed/v1_minilm/author_embeddings.npy
      - data/transformed/v1_minilm/item_features.npy
      - data/transformed/v1_minilm/train_user_features.npy
      - data/transformed/v1_minilm/user_features.npy

  build_isbn_index:
    # ISBN-13 → UCSD book_id lookup used by the v4 ingest path. One-off
    # precompute that rarely changes (only on raw books dump refresh).
    cmd: .venv/bin/python -m mybookrec.features.build_isbn_index
    deps:
      - data/raw/ucsd/goodreads_books.json.gz
      - mybookrec/features/build_isbn_index.py
    outs:
      - data/transformed/shared/isbn13_to_book_id.json

  build_embedding_input:
    # Combined UCSD + silver-bulk catalog with minimal schema (book_id, title,
    # description, source). Upload data/transformed/shared/embedding_input.parquet
    # to Google Drive and the Colab embed.ipynb reads it directly.
    cmd: .venv/bin/python -m mybookrec.features.build_embedding_input
    deps:
      - data/transformed/shared/books_with_genres.parquet
      - data/transformed/shared/isbn13_to_book_id.json
      - data/silver/books.parquet
      - mybookrec/features/build_embedding_input.py
    outs:
      - data/transformed/shared/embedding_input.parquet

  # --- Ingest lane (bronze → silver → gold → FAISS refresh) ---
  # Bronze is NOT a DVC stage — its producers (ingest.cli fetch,
  # bulk_openlibrary) depend on external network resources DVC can't track.
  # The downstream stages take data/bronze/ as a coarse dep so silver/gold/refresh
  # rebuild when new bronze shards land.

  ingest_silver:
    cmd: .venv/bin/python -m mybookrec.ingest.cli silver --source both
    deps:
      - data/bronze
      - mybookrec/ingest/to_silver.py
      - mybookrec/ingest/sources.py
      - mybookrec/ingest/schemas.py
      - mybookrec/ingest/openlibrary.py
      - mybookrec/ingest/google_books.py
      - mybookrec/ingest/bulk_openlibrary.py
    outs:
      - data/silver/books.parquet

  ingest_gold_v4:
    cmd: .venv/bin/python -m mybookrec.ingest.cli gold --feature-set v4
    deps:
      - data/silver/books.parquet
      - data/transformed/shared/isbn13_to_book_id.json
      - data/transformed/shared/book_id_to_index.json
      - data/transformed/shared/book_to_author_idx.npy
      - data/transformed/shared/num_pages_norm_params.json
      - data/transformed/v1_minilm/author_embeddings.npy
      - mybookrec/features/genre_vocab.json
      - mybookrec/ingest/to_gold.py
      - mybookrec/ingest/author_lookup.py
    outs:
      - data/gold/books.parquet
      - data/gold/embeddings.npy
      - data/gold/item_features.npy
      - data/gold/book_ids.json
